server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    charset utf-8;
    server_tokens off;

    # não expor arquivos de infraestrutura
    location ~* \.(ya?ml|conf|md|log|sh|env)$ { return 404; }
    location = /Dockerfile { return 404; }
    location ~ /\.          { return 404; }   # dotfiles (.git etc.)

    # mídia e estáticos com cache leve (vídeos suportam range/seek nativamente)
    location ~* \.(mp4|webm|ogg|mov|png|jpe?g|gif|svg|ico|webp|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # HTML/CSS/JS sempre revalidados (evita servir versão antiga do cache do navegador)
    location / {
        add_header Cache-Control "no-cache";
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 512;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
